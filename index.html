<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8"/>
  <title>weekomen 的博客</title>
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    body{
      font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
      line-height:1.7;
      transition: background 0.3s, color 0.3s;
      max-width:900px;
      margin:0 auto;
      padding:2rem 1rem;
    }
    .light{background:#f6f8fa;color:#333}
    .dark{background:#121212;color:#e0e0e0}

    header{margin-bottom:2.5rem;display:flex;justify-content:space-between;align-items:center}
    h1{font-size:2.2rem;margin-bottom:0.5rem}
    .subtitle{color:#aaa}
    .light .subtitle{color:#666}

    #toggle{
      padding:6px 12px;border-radius:8px;border:none;cursor:pointer;
      background:#1e1e1e;color:#fff;
    }
    .light #toggle{background:#e0e0e0;color:#333}

    .card{
      border-radius:12px;
      padding:1.8rem;
      margin-bottom:1.5rem;
      box-shadow:0 2px 8px rgba(0,0,0,0.15);
      transition:0.2s;
    }
    .dark .card{background:#1e1e1e}
    .light .card{background:#fff}
    .card:hover{transform:translateY(-2px)}

    .card time{color:#888;font-size:0.85rem}
    .light .card time{color:#777}
    .card h2{margin:0.6rem 0}
    .card a{text-decoration:none}
    .dark .card a{color:#fff}
    .light .card a{color:#111}
    .dark .card a:hover{color:#4fc3f7}
    .light .card a:hover{color:#0066cc}
    .dark .card p{color:#bbb}
    .light .card p{color:#555}

    footer{margin-top:4rem;text-align:center;color:#777;font-size:0.9rem}
  </style>
</head>

<body class="dark">
<header>
  <div>
    <h1>感谢github共享开源提供平台</h1>
    <p class="subtitle">记录学习与日常</p>
  </div>
  <button id="toggle">切换模式</button>
</header>

<div class="articles">
  <div class="card">
    <time>2026-03-29</time>
    <h2><a href="article1.html">GitHub Pages 搭建博客成功</a></h2>
    <p>终于把 GitHub Pages 跑起来了，原来只需要一个 index.html 就可以拥有自己的网站。</p>
  </div>

  <div class="card">
    <time>2026-03-29</time>
    <h2><a href="article2.html">学习 HTML & CSS 的第一天</a></h2>
    <p>今天开始学做网页，卡片、排版、跳转链接，原来这么简单。</p>
  </div>
</div>

<footer>© 2026 weekomen • GitHub Pages</footer>

<script>
  const body = document.body
  const toggle = document.getElementById('toggle')
  const mode = localStorage.getItem('mode') || 'dark'

  body.className = mode
  toggle.textContent = mode === 'dark' ? '白天模式' : '黑夜模式'

  toggle.addEventListener('click', () => {
    const newMode = body.classList.contains('dark') ? 'light' : 'dark'
    body.className = newMode
    toggle.textContent = newMode === 'dark' ? '白天模式' : '黑夜模式'
    localStorage.setItem('mode', newMode)
  })
</script>
</body>
</html>
